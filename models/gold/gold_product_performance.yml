version: 2

models:
  - name: gold_product_performance
    description: "{{ doc('gold_product_performance') }}"
    config:
      contract:
        enforced: true
    columns:
      - name: sku
        description: "Product SKU. Falls back to product_name for unmatched POS items."
        data_type: string
      - name: product_name
        description: "Product display name."
        data_type: string
        constraints:
          - type: not_null
      - name: category
        description: "Product category. 'Unknown' for unmatched POS items."
        data_type: string
        constraints:
          - type: not_null
      - name: price
        description: "Current list price in USD. Null for unmatched POS items."
        data_type: decimal(5,2)
      - name: transaction_count
        description: "Number of distinct order line items for this product."
        data_type: bigint
        constraints:
          - type: not_null
      - name: units_sold
        description: "Total units sold across both channels."
        data_type: bigint
        constraints:
          - type: not_null
      - name: total_revenue
        description: "Total revenue from completed orders in USD."
        data_type: decimal(26,2)
        constraints:
          - type: not_null
      - name: online_units
        description: "Units sold through the online channel."
        data_type: bigint
        constraints:
          - type: not_null
      - name: in_store_units
        description: "Units sold through the in-store channel."
        data_type: bigint
        constraints:
          - type: not_null
      - name: online_revenue
        description: "Revenue from the online channel in USD."
        data_type: decimal(26,2)
        constraints:
          - type: not_null
      - name: in_store_revenue
        description: "Revenue from the in-store channel in USD."
        data_type: decimal(26,2)
        constraints:
          - type: not_null
