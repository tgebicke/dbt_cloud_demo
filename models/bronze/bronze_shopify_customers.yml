version: 2

models:
  - name: bronze_shopify_customers
    description: "{{ doc('bronze_shopify_customers') }}"
    config:
      contract:
        enforced: true
      meta:
        pii_columns: [email, first_name, last_name, phone]
    columns:
      - name: customer_id
        description: "Shopify-assigned unique customer identifier."
        data_type: int
        constraints:
          - type: not_null
      - name: email
        description: "Customer email address."
        data_type: string
        constraints:
          - type: not_null
      - name: first_name
        description: "Customer first name."
        data_type: string
        constraints:
          - type: not_null
      - name: last_name
        description: "Customer last name."
        data_type: string
        constraints:
          - type: not_null
      - name: phone
        description: "Customer phone number in E.164 format."
        data_type: string
      - name: country
        description: "Two-letter ISO country code."
        data_type: string
      - name: marketing_opt_in
        description: "Whether the customer has opted in to marketing communications."
        data_type: boolean
        constraints:
          - type: not_null
      - name: created_at
        description: "Timestamp when the account was created in Shopify (UTC)."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'shopify' for this model."
        data_type: string
        constraints:
          - type: not_null
