version: 2

models:
  - name: bronze_shopify_customers
    description: "Shopify customer accounts. Light rename of source columns with a _source tag added."
    config:
      contract:
        enforced: true
    columns:
      - name: customer_id
        description: "Shopify-assigned unique customer identifier."
        data_type: int
        constraints:
          - type: not_null
      - name: email
        description: "Customer email address."
        data_type: string
        constraints:
          - type: not_null
      - name: first_name
        description: "Customer first name."
        data_type: string
        constraints:
          - type: not_null
      - name: last_name
        description: "Customer last name."
        data_type: string
        constraints:
          - type: not_null
      - name: phone
        description: "Customer phone number in E.164 format."
        data_type: string
      - name: country
        description: "Two-letter ISO country code."
        data_type: string
      - name: marketing_opt_in
        description: "Whether the customer has opted in to marketing communications."
        data_type: boolean
        constraints:
          - type: not_null
      - name: created_at
        description: "Timestamp when the account was created in Shopify (UTC)."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'shopify' for this model."
        data_type: string
        constraints:
          - type: not_null

  - name: bronze_shopify_products
    description: "Shopify product catalog. Light rename of source columns with a _source tag added."
    config:
      contract:
        enforced: true
    columns:
      - name: product_id
        description: "Shopify-assigned unique product identifier."
        data_type: int
        constraints:
          - type: not_null
      - name: sku
        description: "Stock Keeping Unit. Unique product code."
        data_type: string
        constraints:
          - type: not_null
      - name: product_name
        description: "Product display name."
        data_type: string
        constraints:
          - type: not_null
      - name: category
        description: "Product category."
        data_type: string
        constraints:
          - type: not_null
      - name: price
        description: "List price in USD."
        data_type: decimal(5,2)
        constraints:
          - type: not_null
      - name: is_active
        description: "Whether the product is currently active on the storefront."
        data_type: boolean
        constraints:
          - type: not_null
      - name: created_at
        description: "Timestamp when the product was added to the catalog (UTC)."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'shopify' for this model."
        data_type: string
        constraints:
          - type: not_null

  - name: bronze_shopify_orders
    description: "Shopify orders. Light rename of source columns with channel metadata and _source tag."
    config:
      contract:
        enforced: true
    columns:
      - name: order_id
        description: "Shopify-assigned unique order identifier."
        data_type: int
        constraints:
          - type: not_null
      - name: customer_id
        description: "Foreign key to the customer who placed the order."
        data_type: int
        constraints:
          - type: not_null
      - name: status
        description: "Shopify order status: fulfilled, refunded, or pending."
        data_type: string
        constraints:
          - type: not_null
      - name: channel
        description: "Sales channel. Always 'web' for Shopify."
        data_type: string
        constraints:
          - type: not_null
      - name: device_type
        description: "Device used to place the order: desktop, mobile, or tablet."
        data_type: string
      - name: promo_code
        description: "Promotional code applied at checkout. Nullable."
        data_type: string
      - name: created_at
        description: "Timestamp when the order was placed (UTC)."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: updated_at
        description: "Timestamp when the order was last updated (UTC)."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'shopify' for this model."
        data_type: string
        constraints:
          - type: not_null

  - name: bronze_shopify_order_items
    description: "Shopify order line items. Light rename of source columns with SKU denormalized and _source tag added."
    config:
      contract:
        enforced: true
    columns:
      - name: order_item_id
        description: "Unique line item identifier."
        data_type: int
        constraints:
          - type: not_null
      - name: order_id
        description: "Foreign key to orders."
        data_type: int
        constraints:
          - type: not_null
      - name: product_id
        description: "Foreign key to products."
        data_type: int
        constraints:
          - type: not_null
      - name: sku
        description: "SKU of the product at time of purchase."
        data_type: string
        constraints:
          - type: not_null
      - name: quantity
        description: "Number of units purchased."
        data_type: int
        constraints:
          - type: not_null
      - name: unit_price
        description: "Price per unit at time of purchase in USD."
        data_type: decimal(5,2)
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'shopify' for this model."
        data_type: string
        constraints:
          - type: not_null

  - name: bronze_pos_stores
    description: "POS retail store locations. Light rename of source columns with _source tag added."
    config:
      contract:
        enforced: true
    columns:
      - name: store_id
        description: "Unique store identifier."
        data_type: int
        constraints:
          - type: not_null
      - name: store_name
        description: "Store display name."
        data_type: string
        constraints:
          - type: not_null
      - name: city
        description: "City where the store is located."
        data_type: string
        constraints:
          - type: not_null
      - name: state_code
        description: "Two-letter US state code."
        data_type: string
        constraints:
          - type: not_null
      - name: country
        description: "Two-letter ISO country code."
        data_type: string
        constraints:
          - type: not_null
      - name: opened_at
        description: "Timestamp when the store opened."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'pos' for this model."
        data_type: string
        constraints:
          - type: not_null

  - name: bronze_pos_customers
    description: "POS loyalty program customer records. No email — phone is the cross-channel matching key."
    config:
      contract:
        enforced: true
    columns:
      - name: customer_id
        description: "POS-assigned unique customer identifier. Separate ID space from Shopify."
        data_type: int
        constraints:
          - type: not_null
      - name: first_name
        description: "Customer first name."
        data_type: string
        constraints:
          - type: not_null
      - name: last_name
        description: "Customer last name."
        data_type: string
        constraints:
          - type: not_null
      - name: phone
        description: "Customer phone number. Cross-channel matching key with Shopify."
        data_type: string
        constraints:
          - type: not_null
      - name: loyalty_card_number
        description: "Physical loyalty card number (format: LC-XXXXX)."
        data_type: string
        constraints:
          - type: not_null
      - name: home_store_id
        description: "Foreign key to the store where the customer enrolled."
        data_type: int
        constraints:
          - type: not_null
      - name: created_at
        description: "Timestamp when the loyalty account was created."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'pos' for this model."
        data_type: string
        constraints:
          - type: not_null

  - name: bronze_pos_transactions
    description: "POS transactions across all store locations. Includes SALE, RETURN, and VOID types. Timestamps are in local store time."
    config:
      contract:
        enforced: true
    columns:
      - name: transaction_id
        description: "Unique transaction identifier. Separate ID space from Shopify order IDs."
        data_type: int
        constraints:
          - type: not_null
      - name: store_id
        description: "Foreign key to the store where the transaction occurred."
        data_type: int
        constraints:
          - type: not_null
      - name: register_id
        description: "Register terminal identifier (e.g. REG-1A)."
        data_type: string
        constraints:
          - type: not_null
      - name: cashier_id
        description: "Employee identifier for the cashier (e.g. EMP-021)."
        data_type: string
        constraints:
          - type: not_null
      - name: customer_id
        description: "Foreign key to POS customers. Nullable for walk-in guests."
        data_type: int
      - name: transaction_type
        description: "Type of transaction: SALE, RETURN, or VOID."
        data_type: string
        constraints:
          - type: not_null
      - name: local_transaction_timestamp
        description: "Transaction timestamp in local store time as a string (e.g. '2023-01-18 14:35:00'). Cast to timestamp in the silver layer."
        data_type: string
        constraints:
          - type: not_null
      - name: total_amount
        description: "Total transaction amount in USD. Negative for RETURN transactions."
        data_type: decimal(5,2)
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'pos' for this model."
        data_type: string
        constraints:
          - type: not_null

  - name: bronze_pos_transaction_items
    description: "POS transaction line items. Products identified by barcode; name captured at time of sale."
    config:
      contract:
        enforced: true
    columns:
      - name: transaction_item_id
        description: "Unique transaction line item identifier."
        data_type: int
        constraints:
          - type: not_null
      - name: transaction_id
        description: "Foreign key to transactions."
        data_type: int
        constraints:
          - type: not_null
      - name: barcode
        description: "Product barcode scanned at register. Maps to Shopify SKUs in silver_products."
        data_type: string
        constraints:
          - type: not_null
      - name: product_name_at_sale
        description: "Product name at time of sale. May include promotional suffixes cleaned in silver_order_lines."
        data_type: string
        constraints:
          - type: not_null
      - name: quantity
        description: "Number of units in this line item."
        data_type: int
        constraints:
          - type: not_null
      - name: unit_price
        description: "Price per unit in USD. Negative for return line items."
        data_type: decimal(5,2)
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'pos' for this model."
        data_type: string
        constraints:
          - type: not_null
