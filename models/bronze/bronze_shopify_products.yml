version: 2

models:
  - name: bronze_shopify_products
    description: "Shopify product catalog. Light rename of source columns with a _source tag added."
    config:
      contract:
        enforced: true
    columns:
      - name: product_id
        description: "Shopify-assigned unique product identifier."
        data_type: int
        constraints:
          - type: not_null
      - name: sku
        description: "Stock Keeping Unit. Unique product code."
        data_type: string
        constraints:
          - type: not_null
      - name: product_name
        description: "Product display name."
        data_type: string
        constraints:
          - type: not_null
      - name: category
        description: "Product category."
        data_type: string
        constraints:
          - type: not_null
      - name: price
        description: "List price in USD."
        data_type: decimal(5,2)
        constraints:
          - type: not_null
      - name: is_active
        description: "Whether the product is currently active on the storefront."
        data_type: boolean
        constraints:
          - type: not_null
      - name: created_at
        description: "Timestamp when the product was added to the catalog (UTC)."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'shopify' for this model."
        data_type: string
        constraints:
          - type: not_null
