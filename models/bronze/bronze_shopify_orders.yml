version: 2

models:
  - name: bronze_shopify_orders
    description: "{{ doc('bronze_shopify_orders') }}"
    config:
      contract:
        enforced: true
    columns:
      - name: order_id
        description: "Shopify-assigned unique order identifier."
        data_type: int
        constraints:
          - type: not_null
      - name: customer_id
        description: "Foreign key to the customer who placed the order."
        data_type: int
        constraints:
          - type: not_null
      - name: status
        description: "Shopify order status: fulfilled, refunded, or pending."
        data_type: string
        constraints:
          - type: not_null
      - name: channel
        description: "Sales channel. Always 'web' for Shopify."
        data_type: string
        constraints:
          - type: not_null
      - name: device_type
        description: "Device used to place the order: desktop, mobile, or tablet."
        data_type: string
      - name: promo_code
        description: "Promotional code applied at checkout. Nullable."
        data_type: string
      - name: created_at
        description: "Timestamp when the order was placed (UTC)."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: updated_at
        description: "Timestamp when the order was last updated (UTC)."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: _source
        description: "Source system identifier. Always 'shopify' for this model."
        data_type: string
        constraints:
          - type: not_null
      - name: _ingested_at
        description: "Timestamp when this record was last read from the source by dbt."
        data_type: timestamp
        constraints:
          - type: not_null
      - name: _metadata_file_path
        description: "Path of the underlying Delta file containing this record."
        data_type: string
        constraints:
          - type: not_null
      - name: _metadata_file_modified_at
        description: "Last modification time of the underlying Delta file."
        data_type: timestamp
        constraints:
          - type: not_null
