version: 2

sources:
  - name: shopify_raw
    description: "Raw data ingested from the Shopify online storefront. Contains customer accounts, product catalog, orders, and line items for the direct-to-consumer web channel."
    database: cat_demo
    schema: shopify_raw
    tables:
      - name: customers
        description: "Online store customer accounts created via the Shopify storefront."
        columns:
          - name: id
            description: "Shopify-assigned unique customer identifier."
            data_type: int
            tests:
              - unique
              - not_null
          - name: email
            description: "Customer email address. Primary identifier used for account login and marketing."
            data_type: string
            tests:
              - unique
              - not_null
          - name: first_name
            description: "Customer first name."
            data_type: string
            tests:
              - not_null
          - name: last_name
            description: "Customer last name."
            data_type: string
            tests:
              - not_null
          - name: phone
            description: "Customer phone number in E.164 format. Used for cross-channel identity resolution with POS."
            data_type: string
          - name: country
            description: "Two-letter ISO country code of the customer's shipping address."
            data_type: string
          - name: marketing_opt_in
            description: "Whether the customer has opted in to marketing communications."
            data_type: boolean
            tests:
              - not_null
          - name: created_at
            description: "Timestamp when the customer account was created in Shopify (UTC)."
            data_type: timestamp
            tests:
              - not_null

      - name: products
        description: "Product catalog as maintained in Shopify. Each product has a unique SKU used for cross-source product resolution with POS barcodes."
        columns:
          - name: id
            description: "Shopify-assigned unique product identifier."
            data_type: int
            tests:
              - unique
              - not_null
          - name: sku
            description: "Stock Keeping Unit. Unique product code used in Shopify. Maps to POS barcodes via the silver_products model."
            data_type: string
            tests:
              - unique
              - not_null
          - name: name
            description: "Product display name."
            data_type: string
            tests:
              - not_null
          - name: category
            description: "Product category. One of: Footwear, Fitness, Electronics, Accessories, Clothing, Home."
            data_type: string
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['Footwear', 'Fitness', 'Electronics', 'Accessories', 'Clothing', 'Home']
          - name: price
            description: "List price in USD."
            data_type: double
            tests:
              - not_null
          - name: is_active
            description: "Whether the product is currently available for purchase on the storefront."
            data_type: boolean
            tests:
              - not_null
          - name: created_at
            description: "Timestamp when the product was added to the catalog (UTC)."
            data_type: timestamp
            tests:
              - not_null

      - name: orders
        description: "Online orders placed through the Shopify storefront. Includes channel metadata such as device type and promotional codes."
        columns:
          - name: id
            description: "Shopify-assigned unique order identifier."
            data_type: int
            tests:
              - unique
              - not_null
          - name: customer_id
            description: "Foreign key to customers. The customer who placed this order."
            data_type: int
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('shopify_raw', 'customers')
                    field: id
          - name: status
            description: "Shopify order fulfillment status."
            data_type: string
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['fulfilled', 'refunded', 'pending']
          - name: channel
            description: "Sales channel. Always 'web' for Shopify orders."
            data_type: string
            tests:
              - not_null
          - name: device_type
            description: "Device used to place the order. One of: desktop, mobile, tablet."
            data_type: string
            tests:
              - accepted_values:
                  arguments:
                    values: ['desktop', 'mobile', 'tablet']
          - name: promo_code
            description: "Promotional code applied at checkout, if any. Nullable."
            data_type: string
          - name: created_at
            description: "Timestamp when the order was placed (UTC)."
            data_type: timestamp
            tests:
              - not_null
          - name: updated_at
            description: "Timestamp when the order was last updated (UTC)."
            data_type: timestamp
            tests:
              - not_null

      - name: order_items
        description: "Individual line items for each Shopify order. Each row represents one product within an order."
        columns:
          - name: id
            description: "Unique line item identifier."
            data_type: int
            tests:
              - unique
              - not_null
          - name: order_id
            description: "Foreign key to orders."
            data_type: int
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('shopify_raw', 'orders')
                    field: id
          - name: product_id
            description: "Foreign key to products."
            data_type: int
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('shopify_raw', 'products')
                    field: id
          - name: sku
            description: "SKU of the product at time of purchase. Denormalized from the product catalog."
            data_type: string
            tests:
              - not_null
          - name: quantity
            description: "Number of units purchased."
            data_type: int
            tests:
              - not_null
          - name: unit_price
            description: "Price per unit at time of purchase in USD."
            data_type: double
            tests:
              - not_null

  - name: pos_raw
    description: "Raw data from the in-store Point of Sale system. Contains store locations, loyalty customer records, transactions, and line items across 5 retail locations."
    database: cat_demo
    schema: pos_raw
    tables:
      - name: stores
        description: "Physical retail store locations."
        columns:
          - name: id
            description: "Unique store identifier."
            data_type: int
            tests:
              - unique
              - not_null
          - name: name
            description: "Store display name (e.g. 'Manhattan Flagship')."
            data_type: string
            tests:
              - not_null
          - name: city
            description: "City where the store is located."
            data_type: string
            tests:
              - not_null
          - name: state_code
            description: "Two-letter US state code."
            data_type: string
            tests:
              - not_null
          - name: country
            description: "Two-letter ISO country code."
            data_type: string
            tests:
              - not_null
          - name: opened_at
            description: "Timestamp when the store opened."
            data_type: timestamp
            tests:
              - not_null

      - name: customers
        description: "In-store loyalty program customer records. Does not contain email addresses — phone number is the primary identifier used for cross-channel matching with Shopify."
        columns:
          - name: id
            description: "POS-assigned unique customer identifier. Uses a separate ID space from Shopify customer IDs."
            data_type: int
            tests:
              - unique
              - not_null
          - name: first_name
            description: "Customer first name."
            data_type: string
            tests:
              - not_null
          - name: last_name
            description: "Customer last name."
            data_type: string
            tests:
              - not_null
          - name: phone
            description: "Customer phone number. Used as the cross-channel matching key with Shopify customers."
            data_type: string
            tests:
              - not_null
          - name: loyalty_card_number
            description: "Physical loyalty card number assigned at enrollment (format: LC-XXXXX)."
            data_type: string
            tests:
              - unique
              - not_null
          - name: home_store_id
            description: "Foreign key to stores. The store where the customer enrolled in the loyalty program."
            data_type: int
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('pos_raw', 'stores')
                    field: id
          - name: created_at
            description: "Timestamp when the loyalty account was created."
            data_type: timestamp
            tests:
              - not_null

      - name: transactions
        description: "POS transactions across all store locations. Includes sales, returns, and voided transactions. Timestamps are in local store time."
        columns:
          - name: id
            description: "Unique transaction identifier. Uses a separate ID space from Shopify order IDs."
            data_type: int
            tests:
              - unique
              - not_null
          - name: store_id
            description: "Foreign key to stores. The store where the transaction occurred."
            data_type: int
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('pos_raw', 'stores')
                    field: id
          - name: register_id
            description: "Register terminal identifier within the store (e.g. REG-1A)."
            data_type: string
            tests:
              - not_null
          - name: cashier_id
            description: "Employee identifier for the cashier who processed the transaction (e.g. EMP-021)."
            data_type: string
            tests:
              - not_null
          - name: customer_id
            description: "Foreign key to customers. Nullable — walk-in guests without a loyalty card have no customer_id."
            data_type: int
          - name: transaction_type
            description: "Type of POS transaction. SALE = purchase, RETURN = merchandise return, VOID = cancelled transaction."
            data_type: string
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['SALE', 'RETURN', 'VOID']
          - name: local_transaction_timestamp
            description: "Timestamp of the transaction in local store time. Not UTC — timezone conversion is applied in the silver layer."
            data_type: timestamp
            tests:
              - not_null
          - name: total_amount
            description: "Total transaction amount in USD. Negative for RETURN transactions."
            data_type: double
            tests:
              - not_null

      - name: transaction_items
        description: "Line items for each POS transaction. Products are identified by barcode rather than a product ID. The product name is stored at time of sale and may include suffixes like '- Discounted' which are cleaned in the silver layer."
        columns:
          - name: id
            description: "Unique transaction line item identifier."
            data_type: int
            tests:
              - unique
              - not_null
          - name: transaction_id
            description: "Foreign key to transactions."
            data_type: int
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('pos_raw', 'transactions')
                    field: id
          - name: barcode
            description: "Product barcode scanned at the register. Maps to Shopify SKUs via the silver_products barcode mapping."
            data_type: string
            tests:
              - not_null
          - name: product_name_at_sale
            description: "Product name recorded at time of sale. May include promotional suffixes (e.g. 'Hoodie - Discounted'). Cleaned in silver_order_lines."
            data_type: string
            tests:
              - not_null
          - name: quantity
            description: "Number of units in this line item."
            data_type: int
            tests:
              - not_null
          - name: unit_price
            description: "Price per unit at time of sale in USD. Negative for return line items."
            data_type: double
            tests:
              - not_null
